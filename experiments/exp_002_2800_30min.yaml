inherits: _baseline.yaml
name: exp_002_2800_30min
description: Tier 2 grid cell for 2800.HK at 30-minute interval.
data:
  path: data/raw/webull_2800_hk_m30.csv
  start: 2018-04-03
  end: 2026-05-13
market:
  decision_times: ["10:00", "10:30", "11:00", "11:30", "13:30", "14:00", "14:30", "15:00", "15:30"]
  force_close_time: "16:00"
state:
  kwargs:
    thresholds:
      delta_close: [-0.0107142857, 0.0107142857]
      delta_open: [-0.0071428571, 0.0071428571]
      delta_prev: [-0.0057142857, 0.0057142857]
agent:
  kwargs:
    num_decision_points: 9
training:
  walk_forward:
    initial_train_days: 1000
    test_window_days: 250
  episodes_per_window: 5
evaluation:
  baselines:
    - random_binary
    - always_long
    - buy_and_hold
  compute_oracle: true
  feature_signal_check: true
