inherits: ../_baseline.yaml
name: research_2800_30m_log_return_long_bias_three_feature_ternary
description: 'Research sweep: 2800.HK 30m, log_return_long_bias, three_feature, ternary
  actions.'
data:
  path: data/raw/webull_2800_hk_m30.csv
  symbol: 2800.HK
  start: '2018-01-01'
  end: '2026-05-17'
market:
  decision_times:
  - '10:00'
  - '10:30'
  - '11:00'
  - '11:30'
  - '13:30'
  - '14:00'
  - '14:30'
  - '15:00'
  - '15:30'
  force_close_time: '16:00'
state:
  encoder: three_feature
  kwargs:
    thresholds:
      delta_close:
      - -0.0107142857
      - 0.0107142857
      delta_open:
      - -0.0071428571
      - 0.0071428571
      delta_prev:
      - -0.0057142857
      - 0.0057142857
reward:
  function: log_return_long_bias
  kwargs:
    beta: 3.0e-05
agent:
  kwargs:
    num_decision_points: 9
    num_states: 27
    num_actions: 3
    epsilon_start: 0.5
    epsilon_decay_per_episode: 0.98
    epsilon_min: 0.03
    alpha_mode: per_cell
    optimistic_init: 0.0
    tie_break: random
training:
  walk_forward:
    initial_train_days: 500
    test_window_days: 125
  episodes_per_window: 5
evaluation:
  baselines:
  - random_binary
  - always_long
  - buy_and_hold
  compute_oracle: true
  feature_signal_check: true
