inherits: ../_baseline.yaml
name: research_7226_30m_log_return_long_bias_with_volatility_binary
description: 'Research sweep: 7226.HK 30m, log_return_long_bias, with_volatility,
  binary actions.'
data:
  path: data/raw/webull_7226_hk_m30.csv
  symbol: 7226.HK
  start: '2018-01-01'
  end: '2026-05-17'
market:
  decision_times:
  - '10:00'
  - '10:30'
  - '11:00'
  - '11:30'
  - '13:30'
  - '14:00'
  - '14:30'
  - '15:00'
  - '15:30'
  force_close_time: '16:00'
state:
  encoder: with_volatility
  kwargs:
    thresholds:
      delta_close:
      - -0.0192857143
      - 0.0192857143
      delta_open:
      - -0.0128571429
      - 0.0128571429
      delta_prev:
      - -0.0102857143
      - 0.0102857143
reward:
  function: log_return_long_bias
  kwargs:
    beta: 3.0e-05
agent:
  kwargs:
    num_decision_points: 9
    num_states: 81
    num_actions: 2
    epsilon_start: 0.5
    epsilon_decay_per_episode: 0.98
    epsilon_min: 0.03
    alpha_mode: per_cell
    optimistic_init: 0.0
    tie_break: random
training:
  walk_forward:
    initial_train_days: 500
    test_window_days: 125
  episodes_per_window: 5
evaluation:
  baselines:
  - random_binary
  - always_long
  - buy_and_hold
  compute_oracle: true
  feature_signal_check: true
