inherits: ../_baseline.yaml
name: research_7568_30m_log_return_zscore_bins_ternary
description: 'Research sweep: 7568.HK 30m, log_return, zscore_bins, ternary actions.'
data:
  path: data/raw/webull_7568_hk_m30.csv
  symbol: 7568.HK
  start: '2018-01-01'
  end: '2026-05-17'
market:
  decision_times:
  - '10:00'
  - '10:30'
  - '11:00'
  - '11:30'
  - '13:30'
  - '14:00'
  - '14:30'
  - '15:00'
  - '15:30'
  force_close_time: '16:00'
state:
  encoder: zscore_bins
  kwargs:
    thresholds:
      delta_close:
      - -0.0278571429
      - 0.0278571429
      delta_open:
      - -0.0185714286
      - 0.0185714286
      delta_prev:
      - -0.0148571429
      - 0.0148571429
reward:
  function: log_return
  kwargs: {}
agent:
  kwargs:
    num_decision_points: 9
    num_states: 27
    num_actions: 3
    epsilon_start: 0.5
    epsilon_decay_per_episode: 0.98
    epsilon_min: 0.03
    alpha_mode: per_cell
    optimistic_init: 0.0
    tie_break: random
training:
  walk_forward:
    initial_train_days: 500
    test_window_days: 125
  episodes_per_window: 5
evaluation:
  baselines:
  - random_binary
  - always_long
  - buy_and_hold
  compute_oracle: true
  feature_signal_check: true
