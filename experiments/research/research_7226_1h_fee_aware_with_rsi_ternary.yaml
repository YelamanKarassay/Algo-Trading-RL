inherits: ../_baseline.yaml
name: research_7226_1h_fee_aware_with_rsi_ternary
description: 'Research sweep: 7226.HK 1h, fee_aware, with_rsi, ternary actions.'
data:
  path: data/raw/webull_7226_hk_m60.csv
  symbol: 7226.HK
  start: '2018-01-01'
  end: '2026-05-17'
market:
  decision_times:
  - '10:30'
  - '11:30'
  - '14:00'
  - '15:00'
  force_close_time: '16:00'
state:
  encoder: with_rsi
  kwargs:
    thresholds:
      delta_close:
      - -0.027
      - 0.027
      delta_open:
      - -0.018
      - 0.018
      delta_prev:
      - -0.0144
      - 0.0144
reward:
  function: fee_aware
  kwargs:
    fee_penalty: 1.0
agent:
  kwargs:
    num_decision_points: 4
    num_states: 81
    num_actions: 3
    epsilon_start: 0.5
    epsilon_decay_per_episode: 0.98
    epsilon_min: 0.03
    alpha_mode: per_cell
    optimistic_init: 0.0
    tie_break: random
training:
  walk_forward:
    initial_train_days: 500
    test_window_days: 125
  episodes_per_window: 5
evaluation:
  baselines:
  - random_binary
  - always_long
  - buy_and_hold
  compute_oracle: true
  feature_signal_check: true
