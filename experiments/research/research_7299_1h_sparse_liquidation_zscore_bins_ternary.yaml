inherits: ../_baseline.yaml
name: research_7299_1h_sparse_liquidation_zscore_bins_ternary
description: 'Research sweep: 7299.HK 1h, sparse_liquidation, zscore_bins, ternary
  actions.'
data:
  path: data/raw/webull_7299_hk_m60.csv
  symbol: 7299.HK
  start: '2018-01-01'
  end: '2026-05-17'
market:
  decision_times:
  - '10:30'
  - '11:30'
  - '14:00'
  - '15:00'
  force_close_time: '16:00'
state:
  encoder: zscore_bins
  kwargs:
    thresholds:
      delta_close:
      - -0.027
      - 0.027
      delta_open:
      - -0.018
      - 0.018
      delta_prev:
      - -0.0144
      - 0.0144
reward:
  function: sparse_liquidation
  kwargs: {}
agent:
  kwargs:
    num_decision_points: 4
    num_states: 27
    num_actions: 3
    epsilon_start: 0.5
    epsilon_decay_per_episode: 0.98
    epsilon_min: 0.03
    alpha_mode: per_cell
    optimistic_init: 0.0
    tie_break: random
training:
  walk_forward:
    initial_train_days: 500
    test_window_days: 125
  episodes_per_window: 5
evaluation:
  baselines:
  - random_binary
  - always_long
  - buy_and_hold
  compute_oracle: true
  feature_signal_check: true
