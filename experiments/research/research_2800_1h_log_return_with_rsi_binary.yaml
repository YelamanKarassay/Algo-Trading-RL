inherits: ../_baseline.yaml
name: research_2800_1h_log_return_with_rsi_binary
description: 'Research sweep: 2800.HK 1h, log_return, with_rsi, binary actions.'
data:
  path: data/raw/webull_2800_hk_m60.csv
  symbol: 2800.HK
  start: '2018-01-01'
  end: '2026-05-17'
market:
  decision_times:
  - '10:30'
  - '11:30'
  - '14:00'
  - '15:00'
  force_close_time: '16:00'
state:
  encoder: with_rsi
  kwargs:
    thresholds:
      delta_close:
      - -0.015
      - 0.015
      delta_open:
      - -0.01
      - 0.01
      delta_prev:
      - -0.008
      - 0.008
reward:
  function: log_return
  kwargs: {}
agent:
  kwargs:
    num_decision_points: 4
    num_states: 81
    num_actions: 2
    epsilon_start: 0.5
    epsilon_decay_per_episode: 0.98
    epsilon_min: 0.03
    alpha_mode: per_cell
    optimistic_init: 0.0
    tie_break: random
training:
  walk_forward:
    initial_train_days: 500
    test_window_days: 125
  episodes_per_window: 5
evaluation:
  baselines:
  - random_binary
  - always_long
  - buy_and_hold
  compute_oracle: true
  feature_signal_check: true
