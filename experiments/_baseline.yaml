name: baseline_2800_1h_qtable
description: Baseline production-aligned Q-table experiment for 2800.HK with 1-hour decisions.
seed: 42

data:
  source: csv
  path: tests/fixtures/synthetic_5days_1h.csv
  symbol: 2800.HK
  start: 2026-05-04
  end: 2026-05-08
  train_split: 0.7

market:
  capital: 1000000
  fee_bps_one_side: 20
  decision_times: ["10:30", "11:30", "13:30", "14:30", "15:30"]
  force_close_time: "16:00"
  lot_size: 500

state:
  encoder: three_feature
  kwargs:
    thresholds:
      delta_close: [-0.015, 0.015]
      delta_open: [-0.010, 0.010]
      delta_prev: [-0.008, 0.008]

reward:
  function: log_return
  kwargs: {}

agent:
  type: qtable
  kwargs:
    num_decision_points: 5
    num_states: 27
    num_actions: 2
    epsilon_start: 0.4
    epsilon_decay_per_episode: 0.98
    epsilon_min: 0.01
    alpha_mode: per_cell
    optimistic_init: 0.0
    tie_break: random

training:
  walk_forward:
    initial_train_days: 3
    test_window_days: 2
  episodes_per_window: 2

evaluation:
  baselines:
    - random_binary
    - always_long
    - buy_and_hold
  compute_oracle: false
  feature_signal_check: false
