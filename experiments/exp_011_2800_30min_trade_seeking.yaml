inherits: exp_002_2800_30min.yaml
name: exp_011_2800_30min_trade_seeking
description: Trade-seeking 2800.HK M30 Q-table with long-biased reward and optimistic exploration.
reward:
  function: log_return_long_bias
  kwargs:
    beta: 0.00003
agent:
  kwargs:
    num_decision_points: 9
    num_states: 27
    num_actions: 2
    epsilon_start: 0.6
    epsilon_decay_per_episode: 0.97
    epsilon_min: 0.05
    alpha_mode: per_cell
    optimistic_init: 0.001
    tie_break: long
training:
  walk_forward:
    initial_train_days: 1000
    test_window_days: 250
  episodes_per_window: 15
